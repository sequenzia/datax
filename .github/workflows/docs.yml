name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --frozen
        working-directory: docs
      - run: uv run mkdocs build
        working-directory: docs
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/site

  deploy:
    name: Deploy Docs
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
